<!DOCTYPE html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
<style>
    .triangle:hover{
        cursor: pointer;
        fill:rgb(133, 136, 99);
        stroke:black;
    }
    .wood{
        fill:blanchedalmond;
        stroke:black;
        stroke-width: 1px;
    }
    .handle{
        fill:rgb(250, 139, 139);
        stroke:black;
        stroke-width: 1px;
    }
    .cricket-bat:hover{
        transform: scale(1.05);
        opacity:1;
        
        }
    .triangle{
        fill:rgb(79, 79, 49);
    }
    .cricket-bat{
        opacity:0.7;
    }

    .tooltip{
        font-size:12px;
        line-height:9px;
    }
</style>

</head>
<body> 
    <div id="chart"></div>
    <script src="battingStats.js"></script> 
    <div id="tooltip" style="position: absolute; opacity: 0; background: white; border: 1px solid black; padding: 0px; border-radius: 5px;" class="tooltip"></div>
</body>
