<!DOCTYPE html>
<head> 
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
<style>
    *{
        font-family:"roboto";
    }
    .chart{
        display: block;
        position:absolute;
        background-color: rgb(255, 232, 253);
        padding:20px;
        margin:auto;
        align-items: center;
        justify-content: center;
        width: 800px;
        height: 720px;
        outline: 1px solid black;
    }

    svg{
        margin:auto;
        
    }
    .subtitle{
        font-weight: 400;
        font-size: 20px;
    }

    h1{
        text-align:center;
        margin:10px 0px;

    }
    #seg-Conservative{
        fill: #0087dc;
    }
    #seg-Labour{
        fill: #d50000;
    }
    #seg-Neither{
        fill: rgb(72, 72, 72);
    }
    #seg-Unsure{
        fill: rgb(202, 202, 202);
    }
    #seg-Conservative:hover{
        opacity:0.5;
    }
    #seg-Labour:hover{
        opacity:0.5;
    }
    #seg-Neither:hover{
        opacity:0.5;
    }
    #seg-Unsure:hover{
        opacity:0.5;
    }
    .segment{
        stroke: rgb(115, 115, 115);
        stroke-width: 1px;
    }
    .segment-text{
        fill:white;
        font-size: 20px;
        font-weight:600;
    
    }
    .play-button{
        border-radius: 10px;

    }
    .play-button:hover{
        transform:scale(1.05);
        cursor: pointer;
        border-radius: 10px;
        
    }
    #date-display{
        font-size: 20px;
        font-weight: 400;
    }
</style>
</head>
<body>

    <div class="chart" id="chart1">
        <h1>Which party will create more jobs?</h1>
        <p>Brits were asked which potential government they believed would create more jobs. This pie chart shows the answer!

            Since creating this plot I have been made aware of the argument that you <a href="https://www.perceptualedge.com/articles/visual_business_intelligence/save_the_pies_for_dessert.pdf" target="_blank">should never use pie charts</a>. The argument is pretty compelling...</p>
        <div id = sliderContainer></div>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="jobs_pie_chart.js"></script>
</body>
