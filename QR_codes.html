<!DOCTYPE html>
<head>
  <title>QR codes</title>

  <style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
}

.qr-container {
    width: 90%;
    max-width: 800px;
    background-color: #ceb2e6;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    margin: 15px 0;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

h1 {
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 15px;
}

.qr {
    width: 100%;
    max-width: 700px;
    height: auto;
    border-radius: 10px;
    border: 2px solid #999999;
}

  </style>
</head>
<body>
    <div class="qr-container">
        <H1>CV</H1>
        <img src="QR_codes/CV_qr.png" class="qr"/>
    </div>
    <div class="qr-container">
        <H1>Website</H1>
        <img src="QR_codes/website-qr.png" class="qr"/>
    </div>
    <div class="qr-container">
        <H1>LinkedIn</H1>
        <img src="QR_codes/LinkedInQR.png" class="qr"/>
    </div>
    <div class="qr-container">
      <H1>Digital Business Card</H1>
      <img src="QR_codes/businessCardQR.png" class="qr"/>
    </div>
</body>
